  postgres:
    image: postgres:13.22-trixie
    container_name: postgres-db
    environment:
      POSTGRES_DB: daste
      POSTGRES_USER: daste
      POSTGRES_PASSWORD: daste

    ports:
      - "5432:5432"

  mongodb:
    image: mongo:6
    container_name: mongodb
    environment:
      MONGO_INITDB_DATABASE: daste
      MONGO_INITDB_ROOT_USERNAME: daste
      MONGO_INITDB_ROOT_PASSWORD: daste
    ports:
      - "27017:27017"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: daste
      RABBITMQ_DEFAULT_PASS: daste
    ports:
      - "5672:5672"     # connection
      - "15672:15672"   # management UI (http://localhost:15672)

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
